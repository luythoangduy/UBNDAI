name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pytest tests/ -v --tb=short
      # Cổng an toàn nhận diện thủ tục: chặn khi hệ thống tự tin chốt SAI thủ tục.
      # Chạy offline (BM25 in-memory từ catalog), không cần index hay LLM API key.
      - name: Eval nhận diện thủ tục (chốt nhầm phải = 0)
        run: python scripts/eval_identify.py
